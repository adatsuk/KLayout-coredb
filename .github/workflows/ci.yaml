name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-klayout-mcore-rocky8:
    name: klayout + mcore (Rocky Linux 8)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    container:
      image: rockylinux:8

    steps:
      - name: Checkout KLayout-coredb
        uses: actions/checkout@v4
        with:
          path: KLayout-coredb

      - name: Checkout CommonDB
        uses: actions/checkout@v4
        with:
          repository: IHP-GmbH/CommonDB
          path: CommonDB
          token: ${{ secrets.GH_PAT }}

      - name: Install dependencies
        run: bash KLayout-coredb/scripts/ci-rocky8-deps.sh

      - name: Link mcore streamer
        env:
          COMMONDB_ROOT: ${{ github.workspace }}/CommonDB
        run: |
          sed -i 's/\r$//' KLayout-coredb/scripts/*.sh KLayout-coredb/klayout-src/build.sh
          bash KLayout-coredb/scripts/setup_klayout_mcore.sh "${{ github.workspace }}/KLayout-coredb/klayout-src"

      - name: Build KLayout
        working-directory: KLayout-coredb/klayout-src
        run: |
          ./build.sh -build build-release -bin bin-release -noruby -nopython -option "-j$(nproc)"

      - name: Verify binaries
        run: |
          test -x KLayout-coredb/klayout-src/bin-release/klayout
          test -f KLayout-coredb/klayout-src/build-release/db_plugins/mcore.so \
            || test -f KLayout-coredb/klayout-src/bin-release/db_plugins/mcore.so \
            || find KLayout-coredb/klayout-src/build-release -name 'mcore.so' -o -name 'mcore.dll' | grep -q .

      - name: Smoke test CORE load
        env:
          COMMONDB_ROOT: ${{ github.workspace }}/CommonDB
          KLAYOUT: ${{ github.workspace }}/KLayout-coredb/klayout-src/bin-release/klayout
        run: |
          CORE_PATH="$COMMONDB_ROOT/examples/gds_to_core/output/sample.core"
          if [[ ! -f "$CORE_PATH" ]]; then
            echo "Skip smoke test: $CORE_PATH not in CommonDB checkout"
            exit 0
          fi
          "$KLAYOUT" -b -r "${{ github.workspace }}/KLayout-coredb/scripts/test_core_load.rb"

      - name: Upload klayout binary
        uses: actions/upload-artifact@v4
        with:
          name: klayout-rocky8
          path: |
            KLayout-coredb/klayout-src/bin-release/klayout
            KLayout-coredb/klayout-src/build-release/db_plugins/mcore.so
